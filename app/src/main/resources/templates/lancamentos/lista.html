<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lançamentos</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f6f8;
        color: #1f2a37;
      }
      .wrap {
        max-width: 1100px;
        margin: 28px auto;
        padding: 0 16px 44px;
      }
      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        margin-bottom: 14px;
      }
      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
      }
      .subtitle {
        color: #52606d;
        font-size: 13px;
      }
      .card {
        background: #fff;
        border: 1px solid #d7dde4;
        border-radius: 6px;
        overflow: hidden;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid #edf1f5;
        text-align: left;
        font-size: 13px;
      }
      th {
        background: #f7f9fb;
        color: #334e68;
        font-weight: 600;
        border-bottom: 1px solid #dfe7ef;
      }
      tbody tr:hover {
        background: #fafcff;
      }
      .tag {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid #d7dde4;
        background: #fff;
        font-size: 12px;
        color: #334e68;
      }
      .tag.receita {
        border-color: #b7e3c0;
        background: #eef9f1;
        color: #1e6b2b;
      }
      .tag.despesa {
        border-color: #f0c2c2;
        background: #fff2f2;
        color: #8a1f1f;
      }
      .tag.pendente {
        border-color: #f4dd9c;
        background: #fff8e6;
        color: #7a5a00;
      }
      .valor {
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }
      .muted {
        color: #52606d;
      }
      footer {
        margin-top: 14px;
        color: #6b7785;
        font-size: 12px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }
      form {
        margin: 0;
      }
      .linkbtn {
        border: 1px solid #d7dde4;
        background: #fff;
        color: #1f2a37;
        border-radius: 4px;
        padding: 6px 10px;
        font-size: 12px;
        cursor: pointer;
      }
      .linkbtn:hover {
        background: #f7f9fb;
      }
      @media (max-width: 700px) {
        th:nth-child(1),
        td:nth-child(1) {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div>
          <h1>Listagem de lançamentos</h1>
          <div class="subtitle">Despesas e receitas cadastradas no banco</div>
        </div>
        <div class="subtitle">
          <span class="muted" th:text="${#lists.size(lancamentos)} + ' registro(s)'">0 registro(s)</span>
        </div>
      </header>

      <div class="card">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Descrição</th>
              <th>Data</th>
              <th>Valor</th>
              <th>Tipo</th>
              <th>Situação</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="l : ${lancamentos}">
              <td th:text="${l.id}">1</td>
              <td th:text="${l.descricao}">Descrição</td>
              <td th:text="${#temporals.format(l.dataLancamento, 'dd/MM/yyyy')}">01/01/2026</td>
              <td class="valor" th:text="${#numbers.formatDecimal(l.valor, 1, 'COMMA', 2, 'POINT')}">0,00</td>
              <td>
                <span class="tag" th:classappend="${' ' + l.tipoLancamento.name().toLowerCase()}" th:text="${l.tipoLancamento}">
                  RECEITA
                </span>
              </td>
              <td>
                <span class="tag" th:classappend="${' ' + l.situacao.name().toLowerCase()}" th:text="${l.situacao}">
                  EFETIVADO
                </span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <footer>
        <div>Para sair, use o botão ao lado.</div>
        <form method="post" action="/logout">
          <button class="linkbtn" type="submit">Sair</button>
        </form>
      </footer>
    </div>
  </body>
</html>
