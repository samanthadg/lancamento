<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lançamentos</title>
    <style>
      :root {
        --bg: #0b1020;
        --card: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.12);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.68);
        --accent: #a7ff83;
        --danger: #ff7a7a;
        --warn: #ffd27a;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
        background: radial-gradient(1200px 800px at 10% 10%, #1b2b6b 0%, transparent 50%),
          radial-gradient(900px 600px at 90% 30%, #1a6b4b 0%, transparent 52%),
          var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 1050px;
        margin: 36px auto;
        padding: 0 18px 48px;
      }
      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: baseline;
        margin-bottom: 18px;
      }
      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 0.2px;
      }
      .subtitle {
        color: var(--muted);
        font-size: 14px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 18px 70px rgba(0, 0, 0, 0.35);
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 12px 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        text-align: left;
        font-size: 14px;
      }
      th {
        position: sticky;
        top: 0;
        background: rgba(10, 16, 34, 0.9);
        backdrop-filter: blur(8px);
        color: rgba(255, 255, 255, 0.85);
        font-weight: 600;
      }
      tbody tr:hover {
        background: rgba(255, 255, 255, 0.04);
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        font-size: 12px;
        color: rgba(255, 255, 255, 0.85);
        letter-spacing: 0.3px;
      }
      .pill .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--muted);
      }
      .pill.receita .dot {
        background: var(--accent);
      }
      .pill.despesa .dot {
        background: var(--danger);
      }
      .pill.pendente .dot {
        background: var(--warn);
      }
      .valor {
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }
      .muted {
        color: var(--muted);
      }
      footer {
        margin-top: 14px;
        color: var(--muted);
        font-size: 12px;
      }
      @media (max-width: 700px) {
        th:nth-child(1),
        td:nth-child(1) {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div>
          <h1>Listagem de lançamentos</h1>
          <div class="subtitle">Despesas e receitas cadastradas no banco</div>
        </div>
        <div class="subtitle">
          <span class="muted" th:text="${#lists.size(lancamentos)} + ' registro(s)'">0 registro(s)</span>
        </div>
      </header>

      <div class="card">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Descrição</th>
              <th>Data</th>
              <th>Valor</th>
              <th>Tipo</th>
              <th>Situação</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="l : ${lancamentos}">
              <td th:text="${l.id}">1</td>
              <td th:text="${l.descricao}">Descrição</td>
              <td th:text="${#temporals.format(l.dataLancamento, 'dd/MM/yyyy')}">01/01/2026</td>
              <td class="valor" th:text="${#numbers.formatDecimal(l.valor, 1, 'COMMA', 2, 'POINT')}">0,00</td>
              <td>
                <span class="pill" th:classappend="${l.tipoLancamento.name().toLowerCase()}">
                  <span class="dot"></span>
                  <span th:text="${l.tipoLancamento}">RECEITA</span>
                </span>
              </td>
              <td>
                <span class="pill" th:classappend="${l.situacao.name().toLowerCase()}">
                  <span class="dot"></span>
                  <span th:text="${l.situacao}">EFETIVADO</span>
                </span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <footer>
        Dica: acesse <span class="muted">/</span> para ser redirecionado para esta tela.
      </footer>
    </div>
  </body>
</html>
