<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lançamentos</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f6f8;
        color: #1f2a37;
      }
      .wrap {
        max-width: 1100px;
        margin: 28px auto;
        padding: 0 16px 44px;
      }
      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        margin-bottom: 14px;
      }
      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
      }
      .subtitle {
        color: #52606d;
        font-size: 13px;
      }
      .card {
        background: #fff;
        border: 1px solid #d7dde4;
        border-radius: 6px;
        overflow: hidden;
        margin-bottom: 12px;
      }
      .form-grid {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 1fr 1fr auto;
        gap: 10px;
        padding: 12px;
      }
      .field label {
        display: block;
        font-size: 12px;
        color: #52606d;
        margin-bottom: 4px;
      }
      .field input,
      .field select {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #c9d1d9;
        border-radius: 4px;
        padding: 8px 9px;
        font-size: 13px;
        background: #fff;
      }
      .btn-primary {
        border: 1px solid #0b5cab;
        background: #0b66c3;
        color: #fff;
        border-radius: 4px;
        padding: 8px 11px;
        font-size: 13px;
        cursor: pointer;
      }
      .btn-danger {
        border: 1px solid #d9a8a8;
        background: #fff4f4;
        color: #8a1f1f;
        border-radius: 4px;
        padding: 6px 9px;
        font-size: 12px;
        cursor: pointer;
      }
      .btn-primary:hover {
        background: #095aa9;
      }
      .btn-danger:hover {
        background: #ffecec;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid #edf1f5;
        text-align: left;
        font-size: 13px;
      }
      th {
        background: #f7f9fb;
        color: #334e68;
        font-weight: 600;
        border-bottom: 1px solid #dfe7ef;
      }
      th a {
        color: inherit;
        text-decoration: none;
      }
      th a:hover {
        text-decoration: underline;
      }
      tbody tr:hover {
        background: #fafcff;
      }
      .tag {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid #d7dde4;
        background: #fff;
        font-size: 12px;
        color: #334e68;
      }
      .tag.receita {
        border-color: #b7e3c0;
        background: #eef9f1;
        color: #1e6b2b;
      }
      .tag.despesa {
        border-color: #f0c2c2;
        background: #fff2f2;
        color: #8a1f1f;
      }
      .tag.pendente {
        border-color: #f4dd9c;
        background: #fff8e6;
        color: #7a5a00;
      }
      .valor {
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }
      .muted {
        color: #52606d;
      }
      .alert {
        margin: 0 0 10px;
        padding: 9px 11px;
        border-radius: 4px;
        font-size: 13px;
      }
      .alert.ok {
        border: 1px solid #b7e3c0;
        background: #eef9f1;
        color: #1e6b2b;
      }
      .alert.err {
        border: 1px solid #f0c2c2;
        background: #fff2f2;
        color: #8a1f1f;
      }
      footer {
        margin-top: 14px;
        color: #6b7785;
        font-size: 12px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }
      form {
        margin: 0;
      }
      .linkbtn {
        border: 1px solid #d7dde4;
        background: #fff;
        color: #1f2a37;
        border-radius: 4px;
        padding: 6px 10px;
        font-size: 12px;
        cursor: pointer;
      }
      .linkbtn:hover {
        background: #f7f9fb;
      }
      @media (max-width: 700px) {
        .form-grid {
          grid-template-columns: 1fr;
        }
        th:nth-child(1),
        td:nth-child(1) {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div>
          <h1>Listagem de lançamentos</h1>
          <div class="subtitle">Despesas e receitas cadastradas no banco</div>
        </div>
        <div class="subtitle">
          <span class="muted" th:text="${#lists.size(lancamentos)} + ' registro(s)'">0 registro(s)</span>
        </div>
      </header>

      <div th:if="${msg}" class="alert ok" th:text="${msg}">Operação realizada.</div>
      <div th:if="${erro}" class="alert err" th:text="${erro}">Erro.</div>

      <div class="card">
        <form method="post" action="/lancamentos" class="form-grid">
          <div class="field">
            <label for="descricao">Descrição</label>
            <input id="descricao" name="descricao" required />
          </div>
          <div class="field">
            <label for="dataLancamento">Data</label>
            <input id="dataLancamento" name="dataLancamento" type="date" required />
          </div>
          <div class="field">
            <label for="valor">Valor</label>
            <input id="valor" name="valor" type="number" min="0.01" step="0.01" required />
          </div>
          <div class="field">
            <label for="tipoLancamento">Tipo</label>
            <select id="tipoLancamento" name="tipoLancamento">
              <option value="RECEITA">RECEITA</option>
              <option value="DESPESA">DESPESA</option>
            </select>
          </div>
          <div class="field">
            <label for="situacao">Situação</label>
            <select id="situacao" name="situacao">
              <option value="EFETIVADO">EFETIVADO</option>
              <option value="PENDENTE">PENDENTE</option>
              <option value="CANCELADO">CANCELADO</option>
            </select>
          </div>
          <div class="field">
            <label>&nbsp;</label>
            <button class="btn-primary" type="submit">Adicionar</button>
          </div>
        </form>
      </div>

      <div class="card">
        <table>
          <thead>
            <tr>
              <th><a th:href="@{/lancamentos(campo='id',direcao=${campo == 'id' and direcao == 'asc' ? 'desc' : 'asc'})}">ID</a></th>
              <th><a th:href="@{/lancamentos(campo='descricao',direcao=${campo == 'descricao' and direcao == 'asc' ? 'desc' : 'asc'})}">Descrição</a></th>
              <th><a th:href="@{/lancamentos(campo='dataLancamento',direcao=${campo == 'dataLancamento' and direcao == 'asc' ? 'desc' : 'asc'})}">Data</a></th>
              <th><a th:href="@{/lancamentos(campo='valor',direcao=${campo == 'valor' and direcao == 'asc' ? 'desc' : 'asc'})}">Valor</a></th>
              <th><a th:href="@{/lancamentos(campo='tipoLancamento',direcao=${campo == 'tipoLancamento' and direcao == 'asc' ? 'desc' : 'asc'})}">Tipo</a></th>
              <th><a th:href="@{/lancamentos(campo='situacao',direcao=${campo == 'situacao' and direcao == 'asc' ? 'desc' : 'asc'})}">Situação</a></th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="l : ${lancamentos}">
              <td th:text="${l.id}">1</td>
              <td th:text="${l.descricao}">Descrição</td>
              <td th:text="${#temporals.format(l.dataLancamento, 'dd/MM/yyyy')}">01/01/2026</td>
              <td class="valor" th:text="${#numbers.formatDecimal(l.valor, 1, 'COMMA', 2, 'POINT')}">0,00</td>
              <td>
                <span class="tag" th:classappend="${' ' + l.tipoLancamento.name().toLowerCase()}" th:text="${l.tipoLancamento}">
                  RECEITA
                </span>
              </td>
              <td>
                <span class="tag" th:classappend="${' ' + l.situacao.name().toLowerCase()}" th:text="${l.situacao}">
                  EFETIVADO
                </span>
              </td>
              <td>
                <form th:action="@{'/lancamentos/' + ${l.id} + '/excluir'}" method="post">
                  <button class="btn-danger" type="submit">Excluir</button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <footer>
        <div>Para sair, use o botão ao lado.</div>
        <form method="post" action="/logout">
          <button class="linkbtn" type="submit">Sair</button>
        </form>
      </footer>
    </div>
  </body>
</html>
