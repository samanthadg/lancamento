<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acesso</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f6f8;
        color: #1f2a37;
      }
      .container {
        max-width: 420px;
        margin: 72px auto;
        padding: 0 16px;
      }
      .panel {
        background: #fff;
        border: 1px solid #d7dde4;
        border-radius: 6px;
        padding: 18px 18px 14px;
      }
      h1 {
        margin: 0 0 12px 0;
        font-size: 18px;
        font-weight: 700;
      }
      .hint {
        margin: 0 0 14px 0;
        font-size: 13px;
        color: #52606d;
      }
      label {
        display: block;
        font-size: 13px;
        margin: 10px 0 6px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #c9d1d9;
        border-radius: 4px;
        padding: 10px 10px;
        font-size: 14px;
      }
      .row {
        margin-top: 14px;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      button {
        border: 1px solid #0b5cab;
        background: #0b66c3;
        color: #fff;
        border-radius: 4px;
        padding: 10px 12px;
        font-size: 14px;
        cursor: pointer;
      }
      button:hover {
        background: #095aa9;
      }
      .error {
        margin: 0 0 10px 0;
        padding: 10px 12px;
        border: 1px solid #f1c0c0;
        background: #fff2f2;
        color: #8a1f1f;
        border-radius: 4px;
        font-size: 13px;
      }
      .footer {
        margin-top: 10px;
        font-size: 12px;
        color: #6b7785;
      }
      .footer code {
        background: #eef2f6;
        padding: 1px 4px;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="panel">
        <h1>Autenticação</h1>
        <p class="hint">Informe seu login e senha para acessar a listagem.</p>

        <div th:if="${error}" class="error" th:text="${error}">Erro</div>

        <form method="post" action="/login">
          <label for="login">Login</label>
          <input id="login" name="login" autocomplete="username" required />

          <label for="senha">Senha</label>
          <input id="senha" name="senha" type="password" autocomplete="current-password" required />

          <div class="row">
            <button type="submit">Entrar</button>
          </div>
        </form>

        <div class="footer">
          Caso você não tenha credenciais, verifique o arquivo <code>data.sql</code> no projeto.
        </div>
      </div>
    </div>
  </body>
</html>
